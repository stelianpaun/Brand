name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Patch gradlew
        run: |
          chmod +x gradlew
          echo '#!/usr/bin/env sh' > /tmp/gw.sh
          echo 'APP_HOME="$(cd "$(dirname "$0")" && pwd -P)"' >> /tmp/gw.sh
          echo 'CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"' >> /tmp/gw.sh
          echo 'if [ -n "$JAVA_HOME" ]; then JAVACMD="$JAVA_HOME/bin/java"; else JAVACMD="java"; fi' >> /tmp/gw.sh
          echo 'exec "$JAVACMD" -Xmx2048m -Xms512m -Dorg.gradle.appname=gradlew -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"' >> /tmp/gw.sh
          cp /tmp/gw.sh gradlew
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: brand-quiz-debug
          path: app/build/outputs/apk/debug/*.apk
